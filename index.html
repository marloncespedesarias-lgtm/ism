<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iMessage Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #FFFFFF;
            --ios-gray: #8E8E93;
            --ios-received: #E9E9EB;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--ios-bg); 
            margin: 0; display: flex; flex-direction: column; height: 100vh; color: #000; overflow: hidden;
        }

        /* Cabecera iMessage */
        .header { 
            padding: 55px 20px 15px; text-align: center; font-weight: 600; font-size: 17px; 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid #C6C6C8; position: sticky; top: 0; z-index: 10;
        }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* Burbujas */
        .msg { max-width: 70%; padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; position: relative; transition: all 0.2s ease; }
        .sent { align-self: flex-end; background: var(--ios-blue); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--ios-received); color: black; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 11px; margin-bottom: 4px; display: block; color: var(--ios-gray); font-weight: 500; }
        .only-emoji { background: none !important; font-size: 45px !important; padding: 0 !important; }

        /* Burbuja de Ubicación Estilo iOS */
        .location-msg { 
            background: #fff !important; color: #000 !important; border: 0.5px solid #D1D1D6; 
            padding: 0 !important; overflow: hidden; width: 220px;
        }
        .loc-preview { height: 100px; width: 100%; background: #e5e5ea; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .loc-label { padding: 10px; font-size: 14px; font-weight: 600; color: var(--ios-blue); text-align: center; }

        /* Pantalla del Mapa Premium */
        #map-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: none; flex-direction: column;
        }
        #full-map { flex: 1; width: 100%; }
        .map-nav { padding: 50px 20px 15px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; border-bottom: 0.5px solid #ccc; }

        /* Estilo del Marcador de Usuario (Círculo azul de iPhone) */
        .user-location-dot {
            width: 15px; height: 15px; background: #007AFF; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 10px rgba(0,122,255,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,122,255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,122,255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0,122,255, 0); }
        }

        .input-area { 
            padding: 10px 15px 34px; display: flex; align-items: center; gap: 10px;
            background: rgba(249, 249, 249, 0.94); backdrop-filter: blur(20px); border-top: 0.5px solid #C6C6C8;
        }
        input { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid #C6C6C8; font-size: 16px; outline: none; }
        .btn-action { background: var(--ios-blue); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header" id="app-title">Mensajes</div>
    <div id="chat-box"></div>

    <div id="map-overlay">
        <div class="map-nav">
            <span id="map-target-name" style="font-weight: bold;">Ubicación</span>
            <button onclick="closeMap()" style="background:none; border:none; color:var(--ios-blue); font-size:17px; font-weight:600;">Listo</button>
        </div>
        <div id="full-map"></div>
    </div>

    <div class="input-area">
        <button class="btn-action" style="background:none; color:var(--ios-blue); font-size:24px;" id="btnCompartir">⊕</button>
        <input type="text" id="mensajeTxt" placeholder="iMessage" autocomplete="off">
        <button class="btn-action" id="btnEnviar">↑</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, set, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0fSr6nphRd40eVBwhAyrbSj50y7KBkKE",
            authDomain: "msjs-4e2a7.firebaseapp.com",
            databaseURL: "https://msjs-4e2a7-default-rtdb.firebaseio.com",
            projectId: "msjs-4e2a7",
            storageBucket: "msjs-4e2a7.firebasestorage.app",
            messagingSenderId: "1024639339376",
            appId: "1:1024639339376:web:ccc996f317e7fb55f91db5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "mensajes");

        let miNombre = localStorage.getItem("nombreUsuario") || prompt("¿Nombre?") || "Usuario";
        localStorage.setItem("nombreUsuario", miNombre);
        document.getElementById("app-title").textContent = miNombre;

        const input = document.getElementById('mensajeTxt');
        const box = document.getElementById('chat-box');

        // --- MAPA PREMIUM ---
        let leafletMap = L.map('full-map', { zoomControl: false }).setView([9.9281, -84.0907], 15);
        
        // Estilo de mapa más "Limpio" y moderno (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '©CartoDB'
        }).addTo(leafletMap);

        // Marcador con estilo de punto azul de iOS
        const dotIcon = L.divIcon({ className: 'user-location-dot', iconSize: [15, 15] });
        let currentMarker = L.marker([0,0], { icon: dotIcon }).addTo(leafletMap);

        window.openMap = (nombre) => {
            document.getElementById('map-overlay').style.display = 'flex';
            setTimeout(() => leafletMap.invalidateSize(), 300);
            onValue(ref(db, 'rastreo/' + nombre), (snap) => {
                const pos = snap.val();
                if(pos) { 
                    currentMarker.setLatLng([pos.lat, pos.lng]); 
                    leafletMap.flyTo([pos.lat, pos.lng], 17, { duration: 1.5 });
                }
            });
        };
        window.closeMap = () => document.getElementById('map-overlay').style.display = 'none';

        // --- FUNCIONES CHAT ---
        const isOnlyEmoji = (str) => /^(\u00a9|\u00ae|[\u2000-\u3300]|\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff])+$/g.test(str.replace(/\s/g, ''));

        document.getElementById('btnEnviar').onclick = () => {
            if(input.value.trim()) {
                push(chatRef, { nombre: miNombre, texto: input.value, tipo: 'texto', fecha: serverTimestamp() });
                input.value = "";
            }
        };

        document.getElementById('btnCompartir').onclick = () => {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((p) => set(ref(db, 'rastreo/' + miNombre), { lat: p.coords.latitude, lng: p.coords.longitude }));
                push(chatRef, { nombre: miNombre, tipo: 'ubicacion', texto: "📍 Ubicación", fecha: serverTimestamp() });
            }
        };

        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const id = snap.key;
            const esMio = data.nombre === miNombre;
            const div = document.createElement("div");
            div.className = `msg ${esMio ? 'sent' : 'received'}`;
            div.id = id;

            if(esMio) div.onclick = () => { if(confirm("¿Borrar?")) remove(ref(db, 'mensajes/' + id)); };

            if (data.tipo === 'ubicacion') {
                div.classList.add('location-msg');
                div.onclick = () => openMap(data.nombre);
                div.innerHTML = `
                    <div class="loc-preview">📍</div>
                    <div class="loc-label">Ubicación en tiempo real</div>
                `;
            } else {
                if(isOnlyEmoji(data.texto)) div.classList.add('only-emoji');
                div.innerHTML = `<span class="msg-info">${esMio ? '' : data.nombre}</span>${data.texto}`;
            }
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        });

        onChildRemoved(chatRef, (snap) => {
            const el = document.getElementById(snap.key);
            if(el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }
        });
    </script>
</body>
</html>
