<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iMessage Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #FFFFFF; --ios-gray: #8E8E93; --ios-received: #E9E9EB; --ios-red: #FF3B30; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--ios-bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* PANTALLA DE BLOQUEO */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(25px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lock-content { text-align: center; width: 80%; }
        .lock-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ccc; font-size: 24px; text-align: center; margin-bottom: 15px; outline: none; }

        /* CABECERA CON BOTÓN BORRAR TODO */
        .header { 
            padding: 55px 20px 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 0.5px solid #C6C6C8; position: sticky; top: 0; z-index: 10; 
        }
        .header-title { flex-grow: 1; text-align: center; font-weight: 600; font-size: 17px; margin-left: 30px; }
        .btn-trash-all { color: var(--ios-red); background: none; border: none; font-size: 20px; cursor: pointer; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        /* MENSAJES */
        .msg { max-width: 75%; padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .sent { align-self: flex-end; background: var(--ios-blue); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--ios-received); color: black; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 11px; margin-bottom: 4px; display: block; color: var(--ios-gray); }

        .location-msg { background: #fff !important; color: #007AFF !important; border: 1px solid #D1D1D6; padding: 10px !important; min-width: 180px; font-weight: 600; text-align: center; }
        
        #map-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; }
        #full-map { flex: 1; width: 100%; }
        .map-nav { padding: 50px 20px 15px; background: #f9f9f9; display: flex; justify-content: space-between; border-bottom: 0.5px solid #ccc; }

        .input-area { padding: 10px 15px 34px; display: flex; align-items: center; gap: 10px; background: #f9f9f9; border-top: 0.5px solid #C6C6C8; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #C6C6C8; font-size: 16px; outline: none; }
        .btn-blue { color: var(--ios-blue); background: none; border: none; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-content">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="80" style="margin-bottom: 20px;">
            <h2>Código Requerido</h2>
            <input type="password" id="passInput" class="lock-input" placeholder="00" inputmode="numeric" maxlength="2">
            <button onclick="verificarClave()" style="background:var(--ios-blue); color:white; border:none; padding:12px 30px; border-radius:20px; font-weight:600;">Entrar</button>
        </div>
    </div>

    <div class="header">
        <div style="width:30px"></div> <div class="header-title" id="app-title">Mensajes</div>
        <button class="btn-trash-all" onclick="borrarTodoHistorial()">🗑️</button>
    </div>

    <div id="chat-box"></div>

    <div id="map-overlay">
        <div class="map-nav">
            <span id="map-target-name">Ubicación</span>
            <button onclick="closeMap()" style="color:var(--ios-blue); border:none; background:none; font-weight:600;">Listo</button>
        </div>
        <div id="full-map"></div>
    </div>

    <div class="input-area">
        <button class="btn-blue" id="btnCompartir">⊕</button>
        <input type="text" id="mensajeTxt" placeholder="iMessage" autocomplete="off">
        <button class="btn-blue" id="btnEnviar">↑</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, set, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0fSr6nphRd40eVBwhAyrbSj50y7KBkKE",
            authDomain: "msjs-4e2a7.firebaseapp.com",
            databaseURL: "https://msjs-4e2a7-default-rtdb.firebaseio.com",
            projectId: "msjs-4e2a7",
            storageBucket: "msjs-4e2a7.firebasestorage.app",
            messagingSenderId: "1024639339376",
            appId: "1:1024639339376:web:ccc996f317e7fb55f91db5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "mensajes");

        window.verificarClave = () => {
            if(document.getElementById('passInput').value === "26") document.getElementById('lock-screen').style.display = 'none';
            else alert("Clave incorrecta");
        };

        let miNombre = localStorage.getItem("nombreUsuario") || prompt("Tu nombre:") || "Usuario";
        localStorage.setItem("nombreUsuario", miNombre);
        document.getElementById("app-title").textContent = miNombre;

        // --- BORRAR TODO EL HISTORIAL ---
        window.borrarTodoHistorial = () => {
            if(confirm("⚠️ ¿ESTÁS SEGURO? Esto borrará TODOS los mensajes para TODOS los usuarios.")) {
                const pass = prompt("Introduce la clave maestra para borrar todo:");
                if(pass === "26") {
                    remove(chatRef).then(() => alert("Historial borrado.")).catch(e => alert("Error: " + e));
                } else {
                    alert("Clave incorrecta.");
                }
            }
        };

        // --- MAPA ---
        let leafletMap = L.map('full-map', { zoomControl: false }).setView([9.928, -84.09], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(leafletMap);
        let marker = L.marker([0,0], { icon: L.divIcon({ className: 'user-dot' }) }).addTo(leafletMap);

        window.openMap = (nombre) => {
            document.getElementById('map-overlay').style.display = 'flex';
            setTimeout(() => leafletMap.invalidateSize(), 200);
            onValue(ref(db, 'rastreo/' + nombre), (snap) => {
                const pos = snap.val();
                if(pos) { marker.setLatLng([pos.lat, pos.lng]); leafletMap.flyTo([pos.lat, pos.lng], 16); }
            });
        };
        window.closeMap = () => document.getElementById('map-overlay').style.display = 'none';

        // --- ENVIAR ---
        document.getElementById('btnEnviar').onclick = () => {
            const val = document.getElementById('mensajeTxt').value;
            if(val.trim()) {
                push(chatRef, { nombre: miNombre, texto: val, tipo: 'texto', fecha: serverTimestamp() });
                document.getElementById('mensajeTxt').value = "";
            }
        };

        document.getElementById('btnCompartir').onclick = () => {
            navigator.geolocation.getCurrentPosition((p) => {
                set(ref(db, 'rastreo/' + miNombre), { lat: p.coords.latitude, lng: p.coords.longitude });
                push(chatRef, { nombre: miNombre, tipo: 'ubicacion', texto: "Ubicación", fecha: serverTimestamp() });
            });
        };

        // --- RECIBIR ---
        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const id = snap.key;
            const esMio = data.nombre === miNombre;
            const div = document.createElement("div");
            div.className = `msg ${esMio ? 'sent' : 'received'}`;
            div.id = "msg-" + id;

            // Al tocar el mensaje (un toque normal), si es tuyo, pregunta si borrar
            div.onclick = () => {
                if(data.tipo === 'ubicacion') {
                    openMap(data.nombre);
                } else if(esMio) {
                    if(confirm("¿Quieres eliminar este mensaje?")) {
                        remove(ref(db, 'mensajes/' + id));
                    }
                }
            };

            if (data.tipo === 'ubicacion') {
                div.classList.add('location-msg');
                div.innerHTML = `📍 Ubicación en Vivo`;
            } else {
                div.innerHTML = `<span class="msg-info">${esMio ? '' : data.nombre}</span>${data.texto}`;
            }
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        onChildRemoved(chatRef, (snap) => {
            const el = document.getElementById("msg-" + snap.key);
            if(el) el.remove();
        });
    </script>
</body>
</html>
